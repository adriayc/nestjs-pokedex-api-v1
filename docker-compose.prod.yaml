services:
  pokedexapp:
    depends_on:
      - db
    build:
      context: .
      dockerfile: Dockerfile
    image: pokedex-docker
    container_name: pokedexapp
    restart: always # reiniciar el contenedor si se detiene
    ports:
      - '${PORT}:${PORT}'
    # working_dir: /var/ww/pokedex
    environment:
      PORT: ${PORT}
      MONGODB: ${MONGODB}
      DEFAULT_LIMIT: ${DEFAULT_LIMIT}
    # volumes:
    #   - ./:/var/www/pokedex

  db:
    image: mongo:7
    container_name: mongo-poke
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_DATABASE: nest-pokedex
    volumes:
      - ./mongo:/data/db
